name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v3
        
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'  # Look in root, not **/pattern
      
      - name: Install dependencies
        run: npm ci  # Remove working-directory, run at root
      
      - name: Run tests
        run: npm test  # Remove working-directory, run at root
        
      - name: Build Docker image
        run: docker build -t task-manager-api .  # Add the dot at the end


